[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  included_files = ["server/caption-gen/**"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"

# API → Function（须写在 SPA fallback 之前）
[[redirects]]
  from = "/api/caption-gen"
  to = "/.netlify/functions/caption-gen"
  status = 200
  force = true

# Vite base=/caption/：把 /caption 映射到站点根
[[redirects]]
  from = "/caption"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/caption/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/caption/*"
  to = "/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
